<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeFlow Browser Sentinel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>🧠 VibeFlow</h1>
      <div id="connection-status" class="status disconnected">
        <span class="status-dot"></span>
        <span class="status-text">Disconnected</span>
      </div>
    </header>

    <main id="main-content">
      <!-- Login Section -->
      <section id="login-section" class="section">
        <h2>Connect to VibeFlow</h2>
        <form id="login-form">
          <div class="form-group">
            <label for="server-url">Server URL</label>
            <input type="url" id="server-url" placeholder="http://localhost:3000" required>
          </div>
          <div class="form-group">
            <label for="user-email">Email</label>
            <input type="email" id="user-email" placeholder="your@email.com" required>
          </div>
          <button type="submit" class="btn btn-primary">Connect</button>
        </form>
      </section>

      <!-- Status Section (shown when connected) -->
      <section id="status-section" class="section hidden">
        <div class="state-display">
          <span class="state-label">System State:</span>
          <span id="system-state" class="state-value">PLANNING</span>
        </div>
        
        <div class="stats">
          <div class="stat-item">
            <span class="stat-value" id="pomodoro-count">0</span>
            <span class="stat-label">Pomodoros Today</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="daily-cap">8</span>
            <span class="stat-label">Daily Cap</span>
          </div>
        </div>

        <div class="current-task" id="current-task-section">
          <h3>Current Task</h3>
          <p id="current-task-title">No active task</p>
        </div>

        <div class="actions">
          <button id="open-dashboard" class="btn btn-secondary">Open Dashboard</button>
          <button id="disconnect" class="btn btn-danger">Disconnect</button>
        </div>
      </section>
    </main>
  </div>
  <script src="../dist/popup/popup.js" type="module"></script>
</body>
</html>
