<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超时休息中 - VibeFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 500px; }
    .icon { font-size: 80px; margin-bottom: 24px; }
    h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ef4444, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 20px;
      color: #a1a1aa;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 32px;
    }
    .message h2 { 
      font-size: 18px; 
      color: #ef4444; 
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .message p { font-size: 15px; color: #d4d4d8; line-height: 1.6; margin-bottom: 0; }
    .actions { display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-primary { 
      background: linear-gradient(135deg, #22c55e, #16a34a); 
      color: white; 
    }
    .btn-primary:hover { 
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }
    .btn-secondary { 
      background: rgba(255, 255, 255, 0.1); 
      color: #e4e4e7; 
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }
    .breathing { animation: breathe 3s ease-in-out infinite; }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .quote { 
      margin-top: 48px; 
      font-style: italic; 
      color: #71717a; 
      font-size: 14px;
      max-width: 400px;
    }
    .timer {
      font-size: 48px;
      font-weight: 700;
      color: #ef4444;
      margin-bottom: 16px;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-badge">
      <span class="status-dot"></span>
      OVER_REST 状态
    </div>
    <div class="icon breathing">⏰</div>
    <h1>超时休息中</h1>
    <p class="subtitle">休息时间已超过宽限期，请开始下一个番茄钟继续工作。</p>
    <div class="message">
      <h2>⚡ 重新进入专注</h2>
      <p>适度休息有助于恢复精力，但过长的休息会打断工作节奏。开始一个新的番茄钟，重新找回专注状态。</p>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="startPomodoro()">🍅 开始番茄钟</button>
      <button class="btn btn-secondary" onclick="openDashboard()">打开 VibeFlow</button>
    </div>
    <p class="quote">"专注是成功的关键，分心是失败的根源。" — 罗宾·夏尔马</p>
  </div>

  <script>
    async function openDashboard() {
      const result = await chrome.storage.local.get(['serverUrl']);
      const url = result.serverUrl || 'http://localhost:3000';
      window.location.href = url;
    }
    
    async function startPomodoro() {
      const result = await chrome.storage.local.get(['serverUrl']);
      const url = result.serverUrl || 'http://localhost:3000';
      window.location.href = url + '/pomodoro';
    }
  </script>
</body>
</html>
