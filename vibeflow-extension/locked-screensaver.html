<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>请完成今日计划 - VibeFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 500px; }
    .icon { font-size: 80px; margin-bottom: 24px; }
    h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 20px;
      color: #a1a1aa;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .message {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 32px;
    }
    .message h2 { 
      font-size: 18px; 
      color: #f59e0b; 
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .message p { font-size: 15px; color: #d4d4d8; line-height: 1.6; margin-bottom: 0; }
    .actions { display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-primary { 
      background: linear-gradient(135deg, #f59e0b, #f97316); 
      color: white; 
    }
    .btn-primary:hover { 
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }
    .btn-secondary { 
      background: rgba(255, 255, 255, 0.1); 
      color: #e4e4e7; 
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }
    .breathing { animation: breathe 4s ease-in-out infinite; }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #f59e0b;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .quote { 
      margin-top: 48px; 
      font-style: italic; 
      color: #71717a; 
      font-size: 14px;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-badge">
      <span class="status-dot"></span>
      LOCKED 状态
    </div>
    <div class="icon breathing">🔒</div>
    <h1>请完成今日计划</h1>
    <p class="subtitle">新的一天开始了，请先完成 Airlock 流程来规划今天的工作。</p>
    <div class="message">
      <h2>📋 Airlock 流程</h2>
      <p>回顾昨日完成情况，选择今日 Top 3 任务，开启高效的一天。完成 Airlock 后即可正常使用浏览器。</p>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="btn-start">🚀 开始今日计划</button>
      <button class="btn btn-secondary" id="btn-back">返回上一页</button>
    </div>
    <p class="quote">"良好的开始是成功的一半。" — 亚里士多德</p>
  </div>

  <script>
    async function openDashboard() {
      const result = await chrome.storage.local.get(['serverUrl']);
      const url = result.serverUrl || 'http://localhost:3000';
      window.location.href = url + '/airlock';
    }
    
    function goBack() {
      if (history.length > 1) { 
        history.back(); 
      } else { 
        openDashboard();
      }
    }

    // 使用 addEventListener 绑定事件，避免 CSP 内联脚本限制
    document.getElementById('btn-start').addEventListener('click', openDashboard);
    document.getElementById('btn-back').addEventListener('click', goBack);
  </script>
</body>
</html>
